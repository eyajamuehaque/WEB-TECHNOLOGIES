<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

       
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            background-color: white;
            overflow: hidden;
        }

        .sidebar {
            width: 25%;
            background-color: #3b5998;
            color: white;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 50px;
            border: 2px solid white;
            padding: 10px;
        }

        .nav-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #4e69a2;
            color: white;
            text-align: center;
            border-radius: 4px;
            text-decoration: none; 
            display: block;
            transition: background 0.3s;
        }

        .nav-btn:hover {
            background-color: #5d78af;
        }

        .active {
            background-color: #ffffff !important;
            color: #3b5998 !important;
            font-weight: bold;
        }

        .content {
            width: 65%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        .form-box {
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border: 2px solid #e1e4e8;
            border-radius: 12px;
            background-color: #fff;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b5998;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background-color: #42b72a;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .action-btn:hover {
            background-color: #36a420;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="logo">JISAN</div>
            
            <a href="login.html" class="nav-btn active">Login</a>
            <a href="registration.html" class="nav-btn">Registration</a>
        </div>

        <div class="content">
            <div class="form-box">
                <h2>Login</h2>
                <form action="#">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="action-btn">Sign In</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
